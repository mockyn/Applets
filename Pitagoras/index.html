<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teorema de Pitágoras — Explorador Interactivo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f1117;
    --surface:   #181c27;
    --surface2:  #1e2336;
    --border:    #2a3050;
    --text:      #e8eaf2;
    --text-muted:#7a82a8;
    --green:     #34d399;
    --red:       #f87171;
    --sideA:     #60a5fa;
    --sideB:     #a78bfa;
    --sideC:     #f472b6;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 1rem;
    background: var(--surface);
  }
  header h1 {
    font-family: 'Crimson Pro', serif;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--text);
  }
  header span {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .main {
    display: grid;
    grid-template-columns: 3fr 2fr;   /* left column gets more space */
    flex: 1;
  }

  /* ── LEFT ── */
  .col-left {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 1.25rem 1.25rem 1rem;
    gap: 1rem;
  }

  .canvas-wrap {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    flex: 1;
    min-height: 400px;
  }
  #triCanvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* SLIDERS */
  .controls { display: flex; flex-direction: column; gap: .85rem; }

  .slider-row {
    display: grid;
    grid-template-columns: 24px 1fr 44px;
    align-items: center;
    gap: .75rem;
  }
  .side-label {
    font-family: 'Crimson Pro', serif;
    font-size: 1.3rem;
    font-weight: 600;
    text-align: center;
  }
  .side-label.A { color: var(--sideA); }
  .side-label.B { color: var(--sideB); }
  .side-label.C { color: var(--sideC); }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
    background: var(--border);
  }
  input[type=range].A { accent-color: var(--sideA); }
  input[type=range].B { accent-color: var(--sideB); }
  input[type=range].C { accent-color: var(--sideC); }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--bg);
    cursor: pointer;
  }
  input[type=range].A::-webkit-slider-thumb { background: var(--sideA); }
  input[type=range].B::-webkit-slider-thumb { background: var(--sideB); }
  input[type=range].C::-webkit-slider-thumb { background: var(--sideC); }

  .val-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: .9rem;
    font-weight: 600;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    text-align: center;
    padding: .25rem .3rem;
  }
  .val-badge.A { color: var(--sideA); }
  .val-badge.B { color: var(--sideB); }
  .val-badge.C { color: var(--sideC); }

  /* ── RIGHT ── */
  .col-right {
    display: flex;
    flex-direction: column;
    padding: 1.25rem;
    gap: 1.25rem;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
  }
  .panel-title {
    font-size: .65rem;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text-muted);
    margin-bottom: .9rem;
    font-weight: 600;
  }

  .formula {
    font-family: 'Crimson Pro', serif;
    font-size: 1.7rem;
    font-weight: 600;
    color: var(--text-muted);
    text-align: center;
    padding: .4rem 0;
  }
  .formula sup { font-size: .7em; }

  .formula-live {
    font-family: 'Crimson Pro', serif;
    font-size: 1.55rem;
    font-weight: 600;
    text-align: center;
    padding: .35rem 0;
  }
  .formula-live sup { font-size: .7em; }
  .formula-live .fa { color: var(--sideA); }
  .formula-live .fb { color: var(--sideB); }
  .formula-live .fc { color: var(--sideC); }

  .formula-expanded {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.15rem;
    text-align: center;
    padding: .35rem 0;
  }
  .formula-expanded .na { color: var(--sideA); }
  .formula-expanded .nb { color: var(--sideB); }
  .formula-expanded .nc { color: var(--sideC); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: .65rem 0;
  }

  /* RESULT BADGE */
  .result-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .6rem;
    padding: 1rem 1rem;
    border-radius: 10px;
    font-weight: 700;
    font-size: 1.05rem;
    border: 1.5px solid transparent;
    transition: background .25s, border-color .25s, color .25s;
    text-align: center;
  }
  .result-badge.green {
    background: rgba(52,211,153,.1);
    border-color: var(--green);
    color: var(--green);
  }
  .result-badge.red {
    background: rgba(248,113,113,.08);
    border-color: var(--red);
    color: var(--red);
  }
  .result-badge.gray {
    background: rgba(122,130,168,.05);
    border-color: var(--border);
    color: var(--text-muted);
  }
  .result-badge .icon { font-size: 1.4rem; }

  footer {
    padding: .6rem 2rem;
    border-top: 1px solid var(--border);
    font-size: .7rem;
    color: var(--text-muted);
    text-align: center;
  }

  @media (max-width: 780px) {
    .main { grid-template-columns: 1fr; }
    .col-left { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <h1>Teorema de Pitágoras</h1>
  <span>Explorador interactivo</span>
</header>

<div class="main">

  <!-- ═══════════════ LEFT ═══════════════ -->
  <div class="col-left">
    <div class="canvas-wrap">
      <canvas id="triCanvas"></canvas>
    </div>

    <div class="controls">
      <div class="slider-row">
        <span class="side-label A">A</span>
        <input type="range" id="slA" class="A" min="1" max="20" step="1" value="3">
        <span class="val-badge A" id="vA">3</span>
      </div>
      <div class="slider-row">
        <span class="side-label B">B</span>
        <input type="range" id="slB" class="B" min="1" max="20" step="1" value="4">
        <span class="val-badge B" id="vB">4</span>
      </div>
      <div class="slider-row">
        <span class="side-label C">C</span>
        <input type="range" id="slC" class="C" min="1" max="20" step="1" value="5">
        <span class="val-badge C" id="vC">5</span>
      </div>
    </div>
  </div>

  <!-- ═══════════════ RIGHT ═══════════════ -->
  <div class="col-right">

    <div class="panel">
      <div class="panel-title">Teorema de Pitágoras</div>
      <div class="formula">A<sup>2</sup> + B<sup>2</sup> = C<sup>2</sup></div>
    </div>

    <div class="panel">
      <div class="panel-title">Sustitución numérica</div>
      <div class="formula-live" id="fLive"></div>
      <hr class="divider">
      <div class="formula-expanded" id="fExpanded"></div>
      <hr class="divider">
      <div class="result-badge gray" id="resultBadge">
        <span class="icon">—</span>
        <span id="resultText"></span>
      </div>
    </div>

  </div>
</div>

<footer>
  Mueve los deslizadores y descubre cuándo se cumple A² + B² = C²
</footer>

<script>
/* ══════════════════════════════════════════════════════
   CANVAS
══════════════════════════════════════════════════════ */
const canvas = document.getElementById('triCanvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  const wrap = canvas.parentElement;
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  update();
}
window.addEventListener('resize', resizeCanvas);

/* ══════════════════════════════════════════════════════
   CONTROLS
══════════════════════════════════════════════════════ */
const slA = document.getElementById('slA');
const slB = document.getElementById('slB');
const slC = document.getElementById('slC');
[slA, slB, slC].forEach(s => s.addEventListener('input', update));

/* ══════════════════════════════════════════════════════
   PALETTE
══════════════════════════════════════════════════════ */
const COL = {
  A:     '#60a5fa',
  B:     '#a78bfa',
  C:     '#f472b6',
  angle: '#e8eaf2',
  right: '#fbbf24',
  grid:  '#1e2336',
  gap:   '#f87171',   // colour for the "gap" line when triangle fails
};

/* ══════════════════════════════════════════════════════
   MATH HELPERS
══════════════════════════════════════════════════════ */
function deg(r) { return r * 180 / Math.PI; }

function isTriangle(a, b, c) {
  return a + b > c && a + c > b && b + c > a;
}

function computeAngles(a, b, c) {
  const A = Math.acos(Math.max(-1, Math.min(1, (b*b + c*c - a*a) / (2*b*c))));
  const B = Math.acos(Math.max(-1, Math.min(1, (a*a + c*c - b*b) / (2*a*c))));
  const C = Math.PI - A - B;
  return { A, B, C };
}

/* ══════════════════════════════════════════════════════
   GRID
══════════════════════════════════════════════════════ */
function drawGrid() {
  const W = canvas.width, H = canvas.height;
  ctx.strokeStyle = COL.grid;
  ctx.lineWidth = 0.5;
  const step = 28;
  for (let x = 0; x < W; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

/* ══════════════════════════════════════════════════════
   ANGLE ARC / RIGHT-ANGLE SQUARE
══════════════════════════════════════════════════════ */
function sortAngles(d1, d2) {
  let from = d1, to = d2;
  if (from > to) [from, to] = [to, from];
  if (to - from > Math.PI) {
    const span = 2 * Math.PI - (to - from);
    const newFrom = to;
    return [newFrom, newFrom + span];
  }
  return [from, to];
}

function angleLabelPos(cx, cy, from, to, r) {
  const mid = (from + to) / 2;
  return { x: cx + Math.cos(mid) * r * 2.0, y: cy + Math.sin(mid) * r * 2.0 };
}

function drawAngleArc(cx, cy, from, to, r, isRight) {
  if (isRight) {
    const sz  = r * 0.72;
    const dx1 = Math.cos(from) * sz, dy1 = Math.sin(from) * sz;
    const dx2 = Math.cos(to)   * sz, dy2 = Math.sin(to)   * sz;
    ctx.strokeStyle = COL.right;
    ctx.lineWidth   = 2;
    ctx.beginPath();
    ctx.moveTo(cx + dx1, cy + dy1);
    ctx.lineTo(cx + dx1 + dx2, cy + dy1 + dy2);
    ctx.lineTo(cx + dx2, cy + dy2);
    ctx.stroke();
  } else {
    ctx.strokeStyle = COL.angle;
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    ctx.arc(cx, cy, r, from, to, false);
    ctx.stroke();
  }
}

/* ══════════════════════════════════════════════════════
   SIDE LABEL (offset perpendicularly outward from centroid)
══════════════════════════════════════════════════════ */
function drawSideLabel(x1, y1, x2, y2, label, color, cx, cy) {
  // Midpoint of the side
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  // Perpendicular to the side (one of two directions)
  let nx = -(y2 - y1), ny = (x2 - x1);
  const len = Math.sqrt(nx*nx + ny*ny) || 1;
  nx /= len; ny /= len;
  // Ensure normal points AWAY from centroid
  const toCx = cx - mx, toCy = cy - my;
  if (nx * toCx + ny * toCy > 0) { nx = -nx; ny = -ny; }
  const off = 22;
  ctx.fillStyle = color;
  ctx.font = `bold 17px 'Crimson Pro', serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, mx + nx * off, my + ny * off);
}

/* ══════════════════════════════════════════════════════
   DRAW VALID TRIANGLE
══════════════════════════════════════════════════════ */
function drawTriangle(a, b, c, scale, ox, oy) {
  const angs = computeAngles(a, b, c);
  const ang_A = angs.A;

  // Vertices
  // PA = left base, PB = right base, PC = apex
  // Base PA–PB = side c;  PA–PC = side b;  PB–PC = side a
  // Angle at PA = A, at PB = B, at PC = C
  const PA = { x: ox,                               y: oy };
  const PB = { x: ox + c * scale,                   y: oy };
  const PC = { x: ox + b * Math.cos(ang_A) * scale, y: oy - b * Math.sin(ang_A) * scale };

  // Fill
  ctx.beginPath();
  ctx.moveTo(PA.x, PA.y); ctx.lineTo(PB.x, PB.y); ctx.lineTo(PC.x, PC.y);
  ctx.closePath();
  ctx.fillStyle = 'rgba(108,143,255,0.06)';
  ctx.fill();

  // Sides
  const side = (ax, ay, bx, by, col) => {
    ctx.strokeStyle = col; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
  };
  side(PB.x, PB.y, PC.x, PC.y, COL.A);   // side a  (opposite A at PA)
  side(PA.x, PA.y, PC.x, PC.y, COL.B);   // side b  (opposite B at PB)
  side(PA.x, PA.y, PB.x, PB.y, COL.C);   // side c  (opposite C at PC — hyp candidate)

  // Side labels — pass centroid so normal always points outward
  const centX = (PA.x + PB.x + PC.x) / 3;
  const centY = (PA.y + PB.y + PC.y) / 3;
  drawSideLabel(PB.x, PB.y, PC.x, PC.y, 'A', COL.A, centX, centY);
  drawSideLabel(PA.x, PA.y, PC.x, PC.y, 'B', COL.B, centX, centY);
  drawSideLabel(PA.x, PA.y, PB.x, PB.y, 'C', COL.C, centX, centY);

  // Angle arcs — radius capped to a fraction of the SHORTEST side in pixels
  const shortestPx = Math.min(
    Math.hypot(PB.x-PC.x, PB.y-PC.y),   // side a
    Math.hypot(PA.x-PC.x, PA.y-PC.y),   // side b
    Math.hypot(PA.x-PB.x, PA.y-PB.y)    // side c
  );
  const ARC_R = Math.min(shortestPx * 0.22, 28);
  ctx.font = `12px Inter, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // Angle A at PA
  const ang_A_deg = Math.round(deg(angs.A));
  const [fromA, toA] = sortAngles(
    Math.atan2(PB.y - PA.y, PB.x - PA.x),
    Math.atan2(PC.y - PA.y, PC.x - PA.x)
  );
  const isRightA = Math.abs(ang_A_deg - 90) < 1;
  drawAngleArc(PA.x, PA.y, fromA, toA, ARC_R, isRightA);
  const lA = angleLabelPos(PA.x, PA.y, fromA, toA, ARC_R);
  ctx.fillStyle = isRightA ? COL.right : COL.angle;
  ctx.fillText(ang_A_deg + '°', lA.x, lA.y);

  // Angle B at PB
  const ang_B_deg = Math.round(deg(angs.B));
  const [fromB, toB] = sortAngles(
    Math.atan2(PA.y - PB.y, PA.x - PB.x),
    Math.atan2(PC.y - PB.y, PC.x - PB.x)
  );
  const isRightB = Math.abs(ang_B_deg - 90) < 1;
  drawAngleArc(PB.x, PB.y, fromB, toB, ARC_R, isRightB);
  const lB = angleLabelPos(PB.x, PB.y, fromB, toB, ARC_R);
  ctx.fillStyle = isRightB ? COL.right : COL.angle;
  ctx.fillText(ang_B_deg + '°', lB.x, lB.y);

  // Angle C at PC
  const ang_C_deg = Math.round(deg(angs.C));
  const [fromC, toC] = sortAngles(
    Math.atan2(PA.y - PC.y, PA.x - PC.x),
    Math.atan2(PB.y - PC.y, PB.x - PC.x)
  );
  const isRightC = Math.abs(ang_C_deg - 90) < 1;
  drawAngleArc(PC.x, PC.y, fromC, toC, ARC_R, isRightC);
  const lC = angleLabelPos(PC.x, PC.y, fromC, toC, ARC_R);
  ctx.fillStyle = isRightC ? COL.right : COL.angle;
  ctx.fillText(ang_C_deg + '°', lC.x, lC.y);

  // Vertex dots
  [PA, PB, PC].forEach(p => {
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, 2*Math.PI);
    ctx.fillStyle = COL.angle; ctx.fill();
  });
}

/* ══════════════════════════════════════════════════════
   DRAW OPEN CHAIN (invalid triangle)
   Strategy: place A and B as two sides from a shared
   corner, then draw C starting from the end of B — 
   if C is too short or too long to close, the gap
   (or overshoot) is shown in red with a dashed line.
══════════════════════════════════════════════════════ */
function drawOpenChain(a, b, c, scale, W, H) {
  // We'll lay out the chain along the bottom:
  // P0 = pivot (left), P1 = end of side B, P2 = end of side A from P0
  // Then C must connect P1 to P2 — show how it falls short or overshoots.

  // Use a fixed angle of ~55° between A and B so the chain looks like
  // an "almost triangle" — visually intuitive.
  const fixedAngle = Math.PI * 0.55;   // ~100° opening so sides spread apart

  const margin = 60;
  const maxSide = Math.max(a, b, c);
  const sc = (Math.min(W, H) - margin * 2) / maxSide;

  // Anchor at bottom-left area
  const P0 = { x: W * 0.18, y: H * 0.72 };
  // Side C along the base from P0
  const P1 = { x: P0.x + c * sc, y: P0.y };
  // Side B going up-right at fixedAngle from P0
  const P2 = { x: P0.x + b * sc * Math.cos(fixedAngle),
                y: P0.y - b * sc * Math.sin(fixedAngle) };
  // Side A must start from P1 and go toward P2 direction
  // Direction from P1 toward P2
  const dx = P2.x - P1.x, dy = P2.y - P1.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const ux = dx/dist, uy = dy/dist;
  // End of side A from P1 (may not reach P2)
  const P3 = { x: P1.x + a * sc * ux, y: P1.y + a * sc * uy };

  const side = (ax, ay, bx, by, col, dash) => {
    ctx.strokeStyle = col; ctx.lineWidth = 3; ctx.lineCap = 'round';
    if (dash) ctx.setLineDash([8, 5]); else ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
    ctx.setLineDash([]);
  };

  // Draw the three sides as a chain: C (base), B (from P0 up), A (from P1 toward P2)
  side(P0.x, P0.y, P1.x, P1.y, COL.C, false);   // C: base
  side(P0.x, P0.y, P2.x, P2.y, COL.B, false);   // B: upper-left arm
  side(P1.x, P1.y, P3.x, P3.y, COL.A, false);   // A: from right end

  // Gap (or overshoot) between P3 and P2 — dashed red
  const gapDist = Math.sqrt((P3.x-P2.x)**2 + (P3.y-P2.y)**2);
  if (gapDist > 2) {
    side(P3.x, P3.y, P2.x, P2.y, COL.gap, true);
    // Small gap label
    ctx.fillStyle = COL.gap;
    ctx.font = '12px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const gx = (P3.x + P2.x)/2 + 12, gy = (P3.y + P2.y)/2 - 12;
    ctx.fillText('no cierra', gx, gy);
  }

  // Endpoint dots
  [P0, P1, P2, P3].forEach((p, i) => {
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, 2*Math.PI);
    ctx.fillStyle = i === 2 ? '#a78bfa' : (i === 3 ? '#60a5fa' : COL.angle);
    ctx.fill();
  });

  // Side labels — place mid-segment, offset outward
  const lbl = (ax, ay, bx, by, txt, col) => {
    const mx=(ax+bx)/2, my=(ay+by)/2;
    const nx=-(by-ay), ny=(bx-ax), len=Math.sqrt(nx*nx+ny*ny)||1;
    const off=20;
    ctx.fillStyle=col;
    ctx.font='bold 15px "Crimson Pro", serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(txt, mx+(nx/len)*off, my+(ny/len)*off);
  };
  lbl(P0.x, P0.y, P1.x, P1.y, 'C', COL.C);
  lbl(P0.x, P0.y, P2.x, P2.y, 'B', COL.B);
  lbl(P1.x, P1.y, P3.x, P3.y, 'A', COL.A);
}

/* ══════════════════════════════════════════════════════
   UPDATE ALGEBRA PANEL
══════════════════════════════════════════════════════ */
function updateAlgebra(a, b, c, valid) {
  const fLive     = document.getElementById('fLive');
  const fExpanded = document.getElementById('fExpanded');
  const badge     = document.getElementById('resultBadge');

  const a2 = a*a, b2 = b*b, c2 = c*c;
  const sym = a2+b2 === c2 ? '=' : (a2+b2 > c2 ? '>' : '<');

  fLive.innerHTML =
    `<span class="fa">${a}<sup>2</sup></span> + ` +
    `<span class="fb">${b}<sup>2</sup></span> = ` +
    `<span class="fc">${c}<sup>2</sup></span>`;

  fExpanded.innerHTML =
    `<span class="na">${a2}</span> + ` +
    `<span class="nb">${b2}</span> ` +
    `<span style="color:var(--text-muted)">${sym}</span> ` +
    `<span class="nc">${c2}</span>`;

  if (!valid) {
    badge.className = 'result-badge gray';
    badge.innerHTML = `<span class="icon">⚠️</span><span>Triángulo no construible</span>`;
    return;
  }

  if (a2 + b2 === c2) {
    badge.className = 'result-badge green';
    badge.innerHTML = `<span class="icon">✔️</span><span>¡Es un Triángulo Rectángulo!</span>`;
  } else {
    badge.className = 'result-badge red';
    badge.innerHTML = `<span class="icon">❌</span><span>No es un Triángulo Rectángulo</span>`;
  }
}

/* ══════════════════════════════════════════════════════
   MAIN UPDATE
══════════════════════════════════════════════════════ */
function update() {
  const a = parseInt(slA.value);
  const b = parseInt(slB.value);
  const c = parseInt(slC.value);

  document.getElementById('vA').textContent = a;
  document.getElementById('vB').textContent = b;
  document.getElementById('vC').textContent = c;

  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  drawGrid();

  const valid = isTriangle(a, b, c);

  if (valid) {
    // Compute bounding box of the triangle to center it with generous margin
    const ang_A = Math.acos(Math.max(-1, Math.min(1, (b*b + c*c - a*a) / (2*b*c))));
    const margin = 64;
    const scaleX = (W - margin * 2) / Math.max(c, b * Math.cos(ang_A));
    const scaleY = (H - margin * 2) / (b * Math.sin(ang_A));
    const scale  = Math.min(scaleX, scaleY, (Math.min(W,H) - margin*2) / Math.max(a,b,c));

    const triW = Math.max(c * scale, b * Math.cos(ang_A) * scale);
    const triH = b * Math.sin(ang_A) * scale;
    const ox = (W - triW) / 2;
    const oy = (H - triH) / 2 + triH;

    drawTriangle(a, b, c, scale, ox, oy);
  } else {
    drawOpenChain(a, b, c, 1, W, H);
  }

  updateAlgebra(a, b, c, valid);
}
